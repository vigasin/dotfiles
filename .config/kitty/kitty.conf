# Kitty configuration
# Ported from ~/.wezterm.lua to keep the same font, palette and behaviour.

# Font
font_family      MesloLGS Nerd Font Mono
font_size        17.0

# Window
hide_window_decorations   titlebar-only
background_opacity         0.9
background_blur            10
remember_window_size       no
initial_window_width       149c
initial_window_height      40c

# Palette (mirrors the WezTerm colors block)
foreground            #CBE0F0
background            #011423
cursor                #47FF9C
cursor_text_color     #011423
selection_foreground  #CBE0F0
selection_background  #033259

# Normal
color0  #214969
color1  #E52E2E
color2  #44FFB1
color3  #FFE073
color4  #0FC5ED
color5  #A277FF
color6  #24EAF7
color7  #24EAF7

# Bright
color8   #214969
color9   #E52E2E
color10  #44FFB1
color11  #FFE073
color12  #A277FF
color13  #A277FF
color14  #24EAF7
color15  #24EAF7

# Key bindings (mirror the WezTerm keys block)
# Reorder the current tab left/right
map cmd+alt+shift+[  move_tab_backward
map cmd+alt+shift+]  move_tab_forward
# Shift+Enter sends ESC + CR (e.g. for REPLs / multi-line prompts)
map shift+enter      send_text all \x1b\r
